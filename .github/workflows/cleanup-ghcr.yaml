name: Cleanup GHCR Untagged

# Deletes untagged GHCR package versions older than a retention window.
#
# Tags in a container registry are mutable pointers to immutable manifests.
# Each push of the same tag (e.g. :dev, :main) leaves the previous manifest
# behind as an untagged version that accumulates indefinitely. This workflow
# prunes those orphans while leaving every tagged version untouched.
#
# The GITHUB_TOKEN used here must have `packages: write` on the package's
# owning repository — declare that at the caller job level.

on:
  workflow_call:
    inputs:
      package_name:
        description: GHCR package name under the owner (defaults to the repository name).
        required: false
        type: string
        default: ""
      retention_days:
        description: Keep untagged versions updated within this many days.
        required: false
        type: number
        default: 7
      owner_type:
        description: Package owner type — "orgs" or "users".
        required: false
        type: string
        default: orgs
      dry_run:
        description: Log candidates without deleting anything.
        required: false
        type: boolean
        default: false

permissions:
  packages: write

jobs:
  cleanup:
    name: Delete untagged versions older than retention window
    runs-on: ubuntu-latest
    steps:
      - name: Prune untagged GHCR versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          OWNER_TYPE: ${{ inputs.owner_type }}
          REPO_NAME: ${{ github.event.repository.name }}
          PACKAGE_INPUT: ${{ inputs.package_name }}
          RETENTION_DAYS: ${{ inputs.retention_days }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          package="${PACKAGE_INPUT:-$REPO_NAME}"
          # GHCR package names may contain slashes (nested images); encode them for API paths.
          package_enc=${package//\//%2F}

          cutoff_epoch=$(date -u -d "${RETENTION_DAYS} days ago" +%s)
          echo "Owner:          ${OWNER_TYPE}/${OWNER}"
          echo "Package:        ${package}"
          echo "Retention days: ${RETENTION_DAYS}"
          echo "Cutoff (UTC):   $(date -u -d "@${cutoff_epoch}" -Iseconds)"
          echo "Dry run:        ${DRY_RUN}"
          echo

          kept_tagged=0
          kept_recent=0
          deleted=0
          would_delete=0

          page=1
          while :; do
            response=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/${OWNER_TYPE}/${OWNER}/packages/container/${package_enc}/versions?per_page=100&page=${page}")

            count=$(echo "$response" | jq 'length')
            if [ "$count" -eq 0 ]; then
              break
            fi

            while IFS=$'\t' read -r id updated_at tag_count; do
              if [ "$tag_count" -gt 0 ]; then
                kept_tagged=$((kept_tagged + 1))
                continue
              fi

              updated_epoch=$(date -u -d "$updated_at" +%s)
              if [ "$updated_epoch" -gt "$cutoff_epoch" ]; then
                kept_recent=$((kept_recent + 1))
                continue
              fi

              if [ "$DRY_RUN" = "true" ]; then
                echo "DRY RUN: would delete version ${id} (updated ${updated_at})"
                would_delete=$((would_delete + 1))
              else
                echo "Deleting version ${id} (updated ${updated_at})"
                gh api --method DELETE \
                  "/${OWNER_TYPE}/${OWNER}/packages/container/${package_enc}/versions/${id}"
                deleted=$((deleted + 1))
              fi
            done < <(echo "$response" | jq -r '.[] | [.id, .updated_at, (.metadata.container.tags | length)] | @tsv')

            page=$((page + 1))
          done

          echo
          echo "Summary:"
          echo "  kept (tagged):  ${kept_tagged}"
          echo "  kept (recent):  ${kept_recent}"
          if [ "$DRY_RUN" = "true" ]; then
            echo "  would delete:   ${would_delete}"
          else
            echo "  deleted:        ${deleted}"
          fi

          {
            echo "### GHCR cleanup: ${package}"
            echo ""
            echo "| metric | count |"
            echo "| --- | ---: |"
            echo "| kept (tagged) | ${kept_tagged} |"
            echo "| kept (recent, < ${RETENTION_DAYS}d) | ${kept_recent} |"
            if [ "$DRY_RUN" = "true" ]; then
              echo "| would delete | ${would_delete} |"
            else
              echo "| deleted | ${deleted} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
