name: Go Lint

on:
  workflow_call:
    inputs:
      go-version-file:
        description: Path to the Go version file
        required: false
        default: go.mod
        type: string
      vendor:
        description: Run go mod vendor before linting
        required: false
        default: false
        type: boolean
      golangci-args:
        description: Arguments passed to golangci-lint
        required: false
        default: --timeout=10m
        type: string
      golangci-version:
        description: golangci-lint version to install
        required: false
        default: v2.1.6
        type: string

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Ensure vendor directory
        if: inputs.vendor
        run: go mod vendor

      - name: Apply default golangci config
        shell: bash
        run: |
          if [ ! -f .golangci.yaml ] && [ ! -f .golangci.yml ] && [ ! -f .golangci.json ] && [ ! -f .golangci.toml ]; then
            VERSION="${{ inputs.golangci-version }}"
            if [[ "$VERSION" == v2.* ]]; then
              CONFIG_URL="https://raw.githubusercontent.com/kupecloud/github-workflows/main/golangci-default.yaml"
            else
              echo "No default config available for golangci-lint v1 — using built-in defaults"
              exit 0
            fi
            echo "No local golangci config found — downloading shared default"
            curl -sSfL "$CONFIG_URL" -o .golangci.yaml
          else
            echo "Using repo-local golangci config"
          fi

      - name: Install golangci-lint
        shell: bash
        run: |
          VERSION="${{ inputs.golangci-version }}"
          if [[ "$VERSION" == v2.* ]]; then
            MODULE="github.com/golangci/golangci-lint/v2/cmd/golangci-lint"
          else
            MODULE="github.com/golangci/golangci-lint/cmd/golangci-lint"
          fi
          GOBIN="$RUNNER_TEMP/bin" go install "${MODULE}@${VERSION}"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run golangci-lint
        id: golangci
        run: golangci-lint run ${{ inputs.golangci-args }}

      - name: golangci-lint summary
        if: always()
        run: |
          if [ "${{ steps.golangci.outcome }}" = "success" ]; then
            {
              echo "Go linting passed."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "Go linting failed."
              echo ""
              echo "- Review the job logs for full details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  go-fmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Check formatting
        id: gofmt
        run: |
          gofmt -l . > gofmt-files.txt
          if [ -s gofmt-files.txt ]; then
            echo "The following files are not formatted correctly:"
            cat gofmt-files.txt
            echo ""
            echo "Please run 'gofmt -w .' to fix formatting."
            exit 1
          fi

      - name: gofmt summary
        if: always()
        run: |
          if [ "${{ steps.gofmt.outcome }}" = "success" ]; then
            {
              echo "Go formatting passed."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "Go formatting failed."
              echo ""
              echo "\`\`\`"
              if [ -s gofmt-files.txt ]; then
                cat gofmt-files.txt
              else
                echo "No files captured."
              fi
              echo "\`\`\`"
              echo "Please run \`gofmt -w .\` to fix formatting."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
