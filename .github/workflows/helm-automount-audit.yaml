name: Helm Automount Audit

on:
  workflow_call:
    inputs:
      chart-path:
        description: Path to the Helm chart directory
        required: true
        type: string
      template-args:
        description: Arguments passed to helm template (e.g., "-f values.yaml -f values/prod.yaml")
        required: false
        default: ""
        type: string
      release-name:
        description: Release name for helm template
        required: false
        default: "audit"
        type: string

permissions:
  contents: read

jobs:
  automount-audit:
    name: pod token automount audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.18.6

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.5/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Render chart
        shell: bash
        run: helm template "${{ inputs.release-name }}" "${{ inputs.chart-path }}" ${{ inputs.template-args }} > /tmp/rendered.yaml

      - name: Audit pod token automount
        shell: bash
        run: |
          # shellcheck disable=SC2016
          automounts=$(yq -N \
            'select((.kind == "Deployment" or .kind == "StatefulSet" or .kind == "DaemonSet")
              and .spec.template.spec.automountServiceAccountToken != false)
            | .metadata.name' \
            /tmp/rendered.yaml | sort -u || true)
          {
            echo "### Pod Token Automount Audit"
            if [ -z "$automounts" ]; then
              echo "All workloads explicitly disable automountServiceAccountToken."
            else
              echo "The following workloads mount SA tokens (review whether each is intentional):"
              echo ""
              echo '```'
              echo "$automounts"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
