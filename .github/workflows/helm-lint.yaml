name: Helm Lint

on:
  workflow_call:
    inputs:
      chart-path:
        description: Path to the Helm chart directory
        required: true
        type: string
      lint-args:
        description: Additional arguments passed to helm lint
        required: false
        default: ""
        type: string

jobs:
  helm-lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.18.6

      - name: Run helm lint
        id: helm-lint
        shell: bash
        run: helm lint "${{ inputs.chart-path }}" ${{ inputs.lint-args }}

      - name: helm lint summary
        if: always()
        run: |
          if [ "${{ steps.helm-lint.outcome }}" = "success" ]; then
            {
              echo "### helm lint"
              echo "Helm lint passed."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### helm lint"
              echo "Helm lint failed."
              echo ""
              echo "- Review the job logs for details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
