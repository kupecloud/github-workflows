name: Node Build

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to install
        required: false
        default: "20"
        type: string
      working-directory:
        description: Directory containing package.json
        required: false
        default: "."
        type: string
      build-script:
        description: npm script name for the build step
        required: false
        default: build
        type: string
      upload-artifact:
        description: Upload the build output as a workflow artifact
        required: false
        default: false
        type: boolean
      artifact-path:
        description: Path (relative to working-directory) to upload when upload-artifact is true
        required: false
        default: dist
        type: string
      artifact-name:
        description: Name of the uploaded artifact
        required: false
        default: build-output
        type: string
      artifact-retention-days:
        description: Days to retain the uploaded artifact
        required: false
        default: 7
        type: number

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run build
        id: build
        run: npm run ${{ inputs.build-script }}

      - name: Build summary
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            {
              echo "### Build"
              echo "Node build passed."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Build"
              echo "Node build failed."
              echo ""
              echo "- Review the job logs for full details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload build artifact
        if: inputs.upload-artifact && steps.build.outcome == 'success' && hashFiles(format('{0}/{1}/**', inputs.working-directory, inputs.artifact-path)) != ''
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/${{ inputs.artifact-path }}
          retention-days: ${{ inputs.artifact-retention-days }}
