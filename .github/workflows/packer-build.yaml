name: Packer Build

on:
  workflow_call:
    inputs:
      semantic_version:
        description: Semantic version to tag the snapshot
        required: false
        type: string
      env:
        description: Environment name to tag the snapshot (dev, prod, ...). Forwarded to Packer as -var env=<value>.
        required: false
        type: string
      packer_dir:
        description: Path to the directory containing the Packer config
        required: false
        type: string
        default: ./packer
      packer_version:
        description: Packer CLI version to install
        required: false
        type: string
        default: 1.14.3
      provider_env_var:
        description: Name of the env var the Packer provider expects for its API token (e.g. HCLOUD_TOKEN, DIGITALOCEAN_TOKEN).
        required: true
        type: string
    secrets:
      provider_token:
        description: Provider API token exposed as the env var named by provider_env_var.
        required: true

permissions:
  contents: read

jobs:
  packer-build:
    name: Packer Build
    runs-on: ubuntu-latest
    # Opt into Node 24 so hashicorp/setup-packer (still on node20 at v3.2.0)
    # does not emit the deprecation warning on every run. GitHub forces Node 24
    # for all JS actions from 2026-06-02; this drop-out is removable then.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Packer
        uses: hashicorp/setup-packer@1aa358be5cf73883762b302a3a03abd66e75b232 # v3.1.0
        with:
          version: ${{ inputs.packer_version }}

      - name: Export provider credentials
        env:
          PROVIDER_ENV_VAR: ${{ inputs.provider_env_var }}
          PROVIDER_TOKEN: ${{ secrets.provider_token }}
        run: |
          {
            echo "${PROVIDER_ENV_VAR}<<PROVIDER_TOKEN_EOF"
            printf '%s\n' "$PROVIDER_TOKEN"
            echo "PROVIDER_TOKEN_EOF"
          } >> "$GITHUB_ENV"

      - name: Packer init
        env:
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: packer init ${{ inputs.packer_dir }}

      - name: Packer validate
        run: packer validate ${{ inputs.packer_dir }}

      - name: Packer build
        env:
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=()
          if [ -n "${{ inputs.semantic_version }}" ]; then
            args+=(-var "semantic_version=${{ inputs.semantic_version }}")
          fi
          if [ -n "${{ inputs.env }}" ]; then
            args+=(-var "env=${{ inputs.env }}")
          fi
          packer build "${args[@]}" ${{ inputs.packer_dir }}
