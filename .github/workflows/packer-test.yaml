name: Packer Test

on:
  workflow_call:
    inputs:
      semantic_version:
        description: Semantic version to test against
        required: false
        type: string
      env:
        description: Environment name the image was tagged with (dev, prod, ...). Forwarded to the smoke test as $ENV so the snapshot selector matches the build.
        required: false
        type: string
      test_script:
        description: Path to the smoke test script
        required: false
        type: string
        default: ./packer/tests/smoke-test.sh
      provider_env_var:
        description: Name of the env var the smoke test expects for the provider API token (e.g. HCLOUD_TOKEN, DIGITALOCEAN_TOKEN).
        required: true
        type: string
    secrets:
      provider_token:
        description: Provider API token exposed as the env var named by provider_env_var.
        required: true

permissions:
  contents: read

jobs:
  packer-test:
    name: Packer Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install hcloud CLI
        run: |
          curl -sSL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz -o /tmp/hcloud.tar.gz
          tar -xzf /tmp/hcloud.tar.gz -C /tmp
          sudo mv /tmp/hcloud /usr/local/bin/hcloud
          hcloud version

      - name: Export provider credentials
        env:
          PROVIDER_ENV_VAR: ${{ inputs.provider_env_var }}
          PROVIDER_TOKEN: ${{ secrets.provider_token }}
        run: |
          {
            echo "${PROVIDER_ENV_VAR}<<PROVIDER_TOKEN_EOF"
            printf '%s\n' "$PROVIDER_TOKEN"
            echo "PROVIDER_TOKEN_EOF"
          } >> "$GITHUB_ENV"

      - name: Run Packer smoke test
        env:
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMANTIC_VERSION: ${{ inputs.semantic_version }}
          ENV: ${{ inputs.env }}
        run: ${{ inputs.test_script }}
