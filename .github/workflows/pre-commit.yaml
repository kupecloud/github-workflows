name: Pre-Commit

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used to install pre-commit
        required: false
        default: "3.13"
        type: string
      go-version:
        description: Go version to install for system pre-commit hooks
        required: false
        default: ""
        type: string
      go-version-file:
        description: Path to a go.mod file used to resolve the Go version
        required: false
        default: ""
        type: string
      node-version:
        description: Node.js version to install for system pre-commit hooks
        required: false
        default: ""
        type: string
      install-helm:
        description: Whether Helm should be installed for pre-commit hooks
        required: false
        default: false
        type: boolean
      helm-version:
        description: Helm version to install when install-helm is enabled
        required: false
        default: "v3.18.6"
        type: string
      args:
        description: Arguments passed to pre-commit run
        required: false
        default: "--all-files"
        type: string

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up Go from go.mod
        if: inputs.go-version-file != ''
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Set up Go
        if: inputs.go-version-file == '' && inputs.go-version != ''
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.go-version }}

      - name: Set up Node
        if: inputs.node-version != ''
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Set up Helm
        if: inputs.install-helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: ${{ inputs.helm-version }}

      - name: Install pre-commit
        run: python -m pip install pre-commit==4.2.0

      - name: Run pre-commit
        id: pre-commit
        shell: bash
        run: pre-commit run ${{ inputs.args }}

      - name: pre-commit summary
        if: always()
        run: |
          if [ "${{ steps.pre-commit.outcome }}" = "success" ]; then
            {
              echo "### pre-commit"
              echo "pre-commit passed."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### pre-commit"
              echo "pre-commit failed."
              echo ""
              echo "- Review the job logs for details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
