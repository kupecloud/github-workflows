name: Publish Node Image

# For Node.js projects that need npm build before Docker (e.g., Headlamp plugins).
# Runs npm ci + npm run build, then builds and pushes the Docker image with cosign signing.

on:
  workflow_call:
    inputs:
      version:
        description: Semantic release version without the leading v
        required: true
        type: string
      node-version:
        description: Node.js version
        required: false
        type: string
        default: "20"
      build-script:
        description: npm script to run before Docker build
        required: false
        type: string
        default: build
      platforms:
        description: Target platforms for Docker buildx
        required: false
        type: string
        default: linux/amd64,linux/arm64
      dockerfile:
        description: Path to Dockerfile
        required: false
        type: string
        default: ./Dockerfile
      context:
        description: Docker build context path
        required: false
        type: string
        default: .

permissions:
  contents: read
  packages: write
  id-token: write # Required for cosign keyless signing via OIDC

jobs:
  publish:
    name: Build, Push & Sign
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ${{ inputs.build-script }}

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372be43e8dfc343204e51b81dfc53e4b6ffc # v3.8.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-
            type=raw,value=${{ inputs.version }}
            type=raw,value=v${{ inputs.version }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign image with cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository }}@${DIGEST}"
