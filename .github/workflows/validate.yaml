name: Validate

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "README.md"
  workflow_call:

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          cache: true
          go-version: "1.25.0"

      - name: Install actionlint
        shell: bash
        run: |
          GOBIN="$RUNNER_TEMP/bin" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run actionlint
        id: actionlint
        run: actionlint

      - name: actionlint summary
        if: always()
        run: |
          if [ "${{ steps.actionlint.outcome }}" = "success" ]; then
            {
              echo "### actionlint"
              echo "actionlint passed."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### actionlint"
              echo "actionlint failed."
              echo ""
              echo "- Review the job logs for details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
